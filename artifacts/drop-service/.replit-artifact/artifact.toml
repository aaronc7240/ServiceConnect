kind = "web"
previewPath = "/"
title = "ServiceConnect - Local Services"
version = "1.0.0"
id = "artifacts/drop-service"
router = "path"

[[integratedSkills]]
name = "react-vite"
version = "1.0.0"

[[services]]
localPort = 23552
name = "web"
paths = ["/"]

[services.development]
run = "pnpm --filter @workspace/drop-service run dev"

[services.env]
PORT = "23552"
BASE_PATH = "/"

[services.production]
build = ["pnpm", "--filter", "@workspace/drop-service", "run", "build"]
publicDir = "artifacts/drop-service/dist/public"
serve = "static"

[[services.production.rewrites]]
from = "/*"
to = "/index.html"
